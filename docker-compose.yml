services:
  mysql:
    image: mysql:8.4
    container_name: team6-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: team6
      MYSQL_USER: team6
      MYSQL_PASSWORD: team6
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  mysql-data:
