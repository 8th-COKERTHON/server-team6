name: Backend CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: chmod +x gradlew
      # TODO: 통합 테스트의 시간대 의존성을 제거한 뒤 테스트 실행을 복구한다.
      - run: ./gradlew clean build -x test
