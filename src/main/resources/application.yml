spring:
  application:
    name: server-team6
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/team6?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:team6}
    password: ${DB_PASSWORD:team6}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false
    locations: classpath:db/migration
    validate-on-migrate: false
    baseline-on-migrate: true
server:
  forward-headers-strategy: framework
jwt:
  secret: ${JWT_SECRET:local-development-secret-key-must-be-at-least-32-bytes}
  access-expiration: 1800000
  refresh-expiration: 1209600000
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
openai:
  title-suggestion:
    enabled: ${OPENAI_TITLE_SUGGESTION_ENABLED:false}
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    model: ${OPENAI_TITLE_MODEL:}
    connect-timeout: ${OPENAI_CONNECT_TIMEOUT:2s}
    read-timeout: ${OPENAI_READ_TIMEOUT:8s}
    max-output-tokens: ${OPENAI_TITLE_MAX_OUTPUT_TOKENS:40}
    max-title-length: ${OPENAI_TITLE_MAX_LENGTH:50}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  dummy-data:
    enabled: ${LOCAL_DUMMY_DATA_ENABLED:false}
